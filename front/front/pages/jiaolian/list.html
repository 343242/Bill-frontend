<!DOCTYPE html>
<html>
<head lang="en">
<meta charset="utf-8">
<title>教练</title>
<meta name="keywords" content="" />
<meta name="description" content="" />
<meta name="renderer" content="webkit">
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="../../layui/css/layui.css">
<link rel="stylesheet" href="../../xznstatic/css/common.css"/>
<link rel="stylesheet" href="../../xznstatic/css/style.css"/>
<script type="text/javascript" src="../../xznstatic/js/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../xznstatic/js/jquery.SuperSlide.2.1.1.js"></script>
</head>
<style>
	html::after {
		position: fixed;
		top: 0;
		right: 0;
		left: 0;
		bottom: 0;
		content: '';
		display: block;
		background-attachment: fixed;
		background-size: cover;
		background-position: center;
	}
	#test1 {
		overflow: hidden;
	}
	#test1 .layui-carousel-ind li {
		width: 20px;
		height: 12px;
		border-width: 0;
		border-style: solid;
		border-color: rgba(0,0,0,.3);
		border-radius: 20px;
		background-color: rgba(225, 236, 237, 1);
		box-shadow: 0 0 6px rgba(255,0,0,0);
	}
	#test1 .layui-carousel-ind li.layui-this {
		width: 25px;
		height: 12px;
		border-width: 0;
		border-style: solid;
		border-color: rgba(0,0,0,.3);
		border-radius: 20px;
		background-color: rgba(0, 131, 199, 1);
		box-shadow: 0 0 6px rgba(255,0,0,0);
	}

	.recommend {
		padding: 10px 0;
		display: flex;
		justify-content: center;
		background-repeat: no-repeat;
		background-position: center center;
		background-size: cover;
	}
	.recommend .box {
	    width: 1002px;
		margin: 0 auto;
	}
	.recommend .box .title {
		padding: 10px 5px;
		display: flex;
		justify-content: space-between;
		align-items: center;
		box-sizing: border-box;
	}
	.recommend .box .title span {
		padding: 0 10px;
		font-size: 16px;
		line-height: 1.4;
	}

	.recommend .box .filter {
		padding: 0 10px;
		display: flex;
		align-items: center;
		box-sizing: border-box;
		width: 100%;
		flex-wrap: wrap;
	}
	.recommend .box .filter .item-list {
		display: flex;
		align-items: center;
	}
	.recommend .box .filter .item-list .lable {
		font-size: 14px;
		color: #333;
		box-sizing: border-box;
	}
	.recommend .box .filter .item-list input {
		padding: 0 10px;
		box-sizing: border-box;
		outline: none;
	}
	.recommend .box .filter button {
		display: flex;
		padding: 0 10px;
		box-sizing: border-box;
		align-items: center;
		justify-content: center;
		outline: none;
	}
	.recommend .box .filter button i {
		margin-right: 4px;
	}

	.recommend .box .list {
		display: flex;
		flex-wrap: wrap;
	}

	.recommend .box .list .list-item {
		flex: 0 0 33%;
		padding: 0 5px;
		box-sizing: border-box;
	}
	.recommend .box .list .list-item .list-item-body {
		cursor: pointer;
		border: 1px solid rgba(0, 0, 0, 3);
		padding: 5px;
		box-sizing: border-box;
	}
	.recommend .box .list .list-item-body img {
		width: 100%;
		height: 100px;
		display: block;
		margin: 0 auto;
	}

	.recommend .box .list .list-item-body .info {
		display: flex;
		flex-wrap: wrap;
	}
	.recommend .box .list .list-item-body .info .price {
		padding-top: 5px;
		color: red;
		font-size: 14px;
		text-align: center;
		box-sizing: border-box;
	}

	.recommend .box .list .list-item-body .info .name {
		padding-top: 5px;
		color: red;
		font-size: 14px;
		text-align: center;
		box-sizing: border-box;
	}

	.recommend .box .list .list-item3 {
		flex: 0 0 33.33%;
	}

	.recommend .box .list .list-item5 {
		flex: 0 0 20%;
	}

	.recommend .box .news {
		display: flex;
		flex-wrap: wrap;
		padding: 0;
		width: 100%;
	}

	.recommend .box .news .list-item {
		flex: 0 0 33%;
		padding: 0 10px;
		box-sizing: border-box;
	}
	.recommend .box .news .list-item .list-item-body {
		cursor: pointer;
		border: 1px solid rgba(0, 0, 0, 3);
		padding: 10px;
		box-sizing: border-box;
		display: flex;
	}

	.recommend .box .news .list-item .list-item-body img {
		width: 120px;
		height: 100%;
		display: block;
		margin: 0 auto;
	}

	.recommend .box .news .list-item .list-item-body .item-info {
		flex: 1;
		display: flex;
		justify-content: space-between;
		flex-direction: column;
		padding-left: 10px;
		box-sizing: border-box;
	}

	.recommend .box .news .list-item .list-item-body .item-info .name {
		padding-top: 5px;
		color: red;
		font-size: 14px;
		box-sizing: border-box;
		overflow: hidden;
		text-overflow: ellipsis;
		display: -webkit-box;
		-webkit-line-clamp: 1;
		-webkit-box-orient: vertical;
	}

	.recommend .box .news .list-item .list-item-body .item-info .time {
		padding-top: 5px;
		color: red;
		font-size: 14px;
		overflow: hidden;
		text-overflow: ellipsis;
		display: -webkit-box;
		-webkit-line-clamp: 1;
		-webkit-box-orient: vertical;
		box-sizing: border-box;
	}

	.recommend .box .news .list-item1 {
		flex: 0 0 100%;
	}

	.recommend .box .news .list-item3 {
		flex: 0 0 33.33%;
	}

	.index-pv1 .animation-box:hover {
		transform: perspective(1000px) translate3d(0px, 0px, 0px) scale(1.2) rotate(0deg) skew(0deg, 0deg);
		transition: all 0.3s;
	}

	.index-pv1 .animation-box img:hover {
		transform: perspective(1000px) translate3d(0px, 0px, 0px) scale(1) rotate(0deg) skew(0deg, 0deg);
		transition: all 0.3s;
	}

	.layui-laypage .layui-laypage-count {
		padding: 0 10px;
	}
	.layui-laypage .layui-laypage-skip {
		padding-left: 10px;
	}

	.coach-card {
		background: #fff;
		border-radius: 10px;
		overflow: hidden;
		transition: all 0.3s;
	}
	.coach-card:hover {
		transform: translateY(-5px);
		box-shadow: 0 5px 20px rgba(0,0,0,0.1);
	}
	.coach-avatar {
		width: 100%;
		height: 180px;
		object-fit: cover;
	}
	.coach-info {
		padding: 15px;
	}
	.coach-name {
		font-size: 18px;
		font-weight: bold;
		color: #333;
		text-align: center;
		margin-bottom: 10px;
	}
	.coach-detail {
		font-size: 14px;
		color: #666;
		line-height: 1.8;
	}
	.coach-detail div {
		margin-bottom: 5px;
	}
	.coach-tag {
		display: inline-block;
		background: rgba(136, 198, 229, 1);
		color: #fff;
		padding: 2px 8px;
		border-radius: 3px;
		font-size: 12px;
		margin-right: 5px;
	}
</style>
<body>
	<div id="app">
		<div class="banner">
			<div class="layui-carousel" id="test1" :style='{"boxShadow":"0 0 0px rgba(255,0,0,0)","margin":"0 auto","borderColor":"rgba(0,0,0,.3)","borderRadius":"0","borderWidth":"0","width":"100%","borderStyle":"solid"}'>
				<div carousel-item>
					<div v-for="(item,index) in swiperList" :key="index">
						<img style="width: 100%;height: 100%;object-fit:cover;" :src="item.img" />
					</div>
				</div>
			</div>
		</div>
		<div class="recommend index-pv1" :style='{"padding":"5px 0 5px 0","boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"5px 0 0 0","borderColor":"rgba(0,0,0,.3)","backgroundColor":"rgba(255, 255, 255, 1)","borderRadius":"0","borderWidth":"0","background":"rgba(255, 255, 255, 1)","borderStyle":"solid"}'>
			<div class="box" style='width:80%'>
				<div class="title" :style='{"padding":"10px 0 10px 0","boxShadow":"0 0 6px rgba(225, 236, 237, 1)","margin":"10px 0 10px 0","borderColor":"rgba(0,0,0,.3)","backgroundColor":"rgba(225, 236, 237, 1)","borderRadius":"30px 30px 0px 0px","borderWidth":"0","borderStyle":"solid","justifyContent":"space-between","height":"54px"}'>
					<span :style='{"padding":"0 10px","boxShadow":"0 0 6px rgba(255,0,0,0)","borderColor":"rgba(255,0,0,1)","backgroundColor":"rgba(0,0,0,0)","color":"#333","borderRadius":"0 0 2px 0","borderWidth":"0","fontSize":"18px","borderStyle":"solid"}'>教练信息</span>
					<span :style='{"padding":"0 10px","boxShadow":"0 0 6px rgba(255,0,0,0)","borderColor":"rgba(0,0,0,0)","backgroundColor":"rgba(0,0,0,0)","color":"rgba(33, 3, 3, 1)","borderRadius":"0","borderWidth":"0","fontSize":"14px","borderStyle":"solid"}'>您现在的位置：教练信息</span>
				</div>
				<form class="layui-form filter" :style='{"padding":"0 10px","boxShadow":"0 0 0px rgba(255,0,0,.8)","margin":"10px 0 10px 0","borderColor":"rgba(0,0,0,.3)","backgroundColor":"rgba(0,0,0,1)","borderRadius":"4px","borderWidth":"0","borderStyle":"solid","justifyContent":"flex-end","height":"64px"}'>
					<div class="item-list">
						<div class="lable" :style='{"padding":"0 10px","boxShadow":"0 0 6px rgba(255,0,0,0)","margin":"0","borderColor":"rgba(0,0,0,0)","backgroundColor":"transparent","color":"#fff","borderRadius":"0","textAlign":"right","borderWidth":"0","width":"auto","fontSize":"16px","borderStyle":"solid"}'>教练工号</div>
						<input type="text" :style='{"boxShadow":"0 0 6px rgba(255,0,0,0)","borderColor":"#ccc","backgroundColor":"#fff","color":"#333","borderRadius":"8px","textAlign":"center","borderWidth":"0","width":"140px","fontSize":"14px","borderStyle":"solid","height":"44px"}' name="jiaoliangonghao" id="jiaoliangonghao" placeholder="教练工号" autocomplete="off" class="layui-input">
					</div>
					<div class="item-list">
						<div class="lable" :style='{"padding":"0 10px","boxShadow":"0 0 6px rgba(255,0,0,0)","margin":"0","borderColor":"rgba(0,0,0,0)","backgroundColor":"transparent","color":"#fff","borderRadius":"0","textAlign":"right","borderWidth":"0","width":"auto","fontSize":"16px","borderStyle":"solid"}'>教练姓名</div>
						<input type="text" :style='{"boxShadow":"0 0 6px rgba(255,0,0,0)","borderColor":"#ccc","backgroundColor":"#fff","color":"#333","borderRadius":"8px","textAlign":"center","borderWidth":"0","width":"140px","fontSize":"14px","borderStyle":"solid","height":"44px"}' name="jiaolianxingming" id="jiaolianxingming" placeholder="教练姓名" autocomplete="off" class="layui-input">
					</div>
					<button :style='{"padding":"0 15px","boxShadow":"0 0 8px rgba(0,0,0,0)","margin":"0 0 0 10px","borderColor":"#409EFF","backgroundColor":"rgba(136, 198, 229, 1)","color":"#fff","borderRadius":"4px","borderWidth":"0","width":"auto","fontSize":"14px","borderStyle":"solid","height":"40px"}' id="btn-search" type="button" class="layui-btn layui-btn-normal">
						<i v-if="true" class="layui-icon layui-icon-search"></i>搜索
					</button>
				</form>
				<div class="list" style="position: relative;">
					<div @click="jump('../jiaolian/detail.html?id='+item.id)" v-for="(item,index) in dataList" :key="index" class="list-item" :class="3=='3'?'list-item3':3=='5'?'list-item5':''">
						<div class="coach-card animation-box" :style='{"padding":"10px","boxShadow":"0 0 0px rgba(136, 198, 229, 1)","margin":"0 10px 20px 0","borderColor":"rgba(136, 198, 229, 1)","backgroundColor":"#fff","borderRadius":"10px","borderWidth":"2px","borderStyle":"solid"}'>
							<img v-if="item.touxiang" :src="item.touxiang?baseurl+item.touxiang.split(',')[0]:''" class="coach-avatar">
							<img v-else src="../../img/profile-bg.jpg" class="coach-avatar">
							<div class="coach-info">
								<div class="coach-name">{{ item.jiaolianxingming }}</div>
								<div class="coach-detail">
									<div><span class="coach-tag">工号</span>{{ item.jiaoliangonghao }}</div>
									<div><span class="coach-tag">性别</span>{{ item.xingbie }}</div>
									<div><span class="coach-tag">手机</span>{{ item.shouji }}</div>
									<div><span class="coach-tag">指导科目</span>{{ item.zhidaokemu }}</div>
								</div>
							</div>
						</div>
					</div>
				</div>
				<div class="pager" id="pager" :style="{textAlign:2==1?'left':2==2?'center':'right'}"></div>
			</div>
		</div>
	</div>

	<script>
		window.layui = {dir: '../../layui/'};
	</script>
	<script src="../../layui/layui.js"></script>
	<script src="../../js/vue.js"></script>
	<script src="../../js/config.js"></script>
	<script src="../../js/utils.js"></script>
	<script>
		layui.extend({
			http: '../../modules/http/http',
			layarea: '../../modules/layarea/layarea',
			tinymce: '../../modules/tinymce/tinymce'
		});
	</script>
	<script src="../../modules/http/http.js"></script>

	<script type="text/javascript">
		var vue = new Vue({
			el: '#app',
			data: {
				swiperList: [],
				dataList: [],
				baseurl: '',
				swiperIndex: '-1'
			},
			filters: {
				newsDesc: function(val) {
					if (val) {
						if (val.length > 60) {
							return val.substring(0, 60).replace(/<[^>]*>/g).replace(/undefined/g, '');
						} else {
							return val.replace(/<[^>]*>/g).replace(/undefined/g, '');
						}
					}
					return '';
				}
			},
			methods: {
				isAuth(tablename, button) {
					return isFrontAuth(tablename, button)
				},
				jump(url) {
					jump(url)
				}
			}
		});

		layui.use(['layer', 'element', 'carousel', 'laypage', 'http', 'jquery', 'laydate'], function() {
			var layer = layui.layer;
			var element = layui.element;
			var carousel = layui.carousel;
			var laypage = layui.laypage;
			var http = layui.http;
			var jquery = layui.jquery;
			var laydate = layui.laydate;

			var limit = 8;
			limit = 3 * 2;
			vue.baseurl = http.baseurl;
			http.request('config/list', 'get', {
				page: 1,
				limit: 5
			}, function(res) {
				if (res.data.list.length > 0) {
					let swiperList = [];
					res.data.list.forEach(element => {
						if (element.value != null) {
							swiperList.push({
								img: http.baseurl + element.value
							});
						}
					});
					vue.swiperList = swiperList;

					vue.$nextTick(() => {
						carousel.render({
							elem: '#test1',
							width: '100%',
							height: '420px',
							arrow: 'hover',
							anim: 'default',
							autoplay: 'true',
							interval: '3000',
							indicator: 'inside'
						});
					});
				}
			});

			pageList();

			jquery('#btn-search').click(function(e) {
				pageList();
			});

			function pageList() {
				var param = {
					page: 1,
					limit: limit
				}

				if (jquery('#jiaoliangonghao').val()) {
					param['jiaoliangonghao'] = jquery('#jiaoliangonghao').val() ? '%' + jquery('#jiaoliangonghao').val() + '%' : '';
				}
				if (jquery('#jiaolianxingming').val()) {
					param['jiaolianxingming'] = jquery('#jiaolianxingming').val() ? '%' + jquery('#jiaolianxingming').val() + '%' : '';
				}

				http.request('jiaolian/list', 'get', param, function(res) {
					vue.dataList = res.data.list
					laypage.render({
						elem: 'pager',
						count: res.data.total,
						limit: limit,
						groups: 5,
						layout: ["prev", "page", "next"],
						theme: '#0099CC',
						jump: function(obj, first) {
							param.page = obj.curr;
							if (!first) {
								http.request('jiaolian/list', 'get', param, function(res) {
									vue.dataList = res.data.list
								})
							}
						}
					});
				})
			}
		});

		window.xznSlide = function() {
			jQuery(".banner").slide({
				mainCell: ".bd ul",
				autoPlay: true,
				interTime: 5000
			});
			jQuery("#ifocus").slide({
				titCell: "#ifocus_btn li",
				mainCell: "#ifocus_piclist ul",
				effect: "leftLoop",
				delayTime: 200,
				autoPlay: true,
				triggerTime: 0
			});
			jQuery("#ifocus").slide({
				titCell: "#ifocus_btn li",
				mainCell: "#ifocus_tx ul",
				delayTime: 0,
				autoPlay: true
			});
			jQuery(".product_list").slide({
				mainCell: ".bd ul",
				autoPage: true,
				effect: "leftLoop",
				autoPlay: true,
				vis: 5,
				trigger: "click",
				interTime: 4000
			});
		};
	</script>
</body>
</html>
