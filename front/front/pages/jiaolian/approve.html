<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>йў„зәҰе®Ўж ё</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../layui/css/layui.css">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/common.css">
</head>
<style>
    html::after {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        bottom: 0;
        content: '';
        display: block;
        background-attachment: fixed;
        background-size: cover;
        background-position: center;
        z-index: -1;
    }
    .index-title {
        text-align: center;
        box-sizing: border-box;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }
    .tab-bar {
        background: #fff;
        padding: 10px 20px;
        border-radius: 8px;
        margin-bottom: 15px;
        display: flex;
        gap: 10px;
    }
    .tab-item {
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.3s;
    }
    .tab-item.active {
        background: #4fc3f7;
        color: #fff;
    }
    .appointment-card {
        background: #fff;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 15px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .appointment-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #eee;
    }
    .appointment-title {
        font-weight: bold;
        font-size: 16px;
    }
    .status-tag {
        padding: 4px 12px;
        border-radius: 4px;
        font-size: 12px;
    }
    .status-pending {
        background: #fff3e0;
        color: #ff9800;
    }
    .status-confirmed {
        background: #e8f5e9;
        color: #4caf50;
    }
    .status-rejected {
        background: #ffebee;
        color: #f44336;
    }
    .info-row {
        display: flex;
        padding: 8px 0;
    }
    .info-label {
        width: 80px;
        color: #999;
    }
    .info-value {
        flex: 1;
        color: #333;
    }
    .action-bar {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid #eee;
        display: flex;
        gap: 10px;
        justify-content: flex-end;
    }
    .reply-input {
        margin-top: 10px;
    }
</style>
<body>
    <div id="app">
        <div class="index-title" style="padding: 20px;">
            <span style="font-size: 24px;font-weight: bold;">йў„зәҰе®Ўж ё</span>
        </div>

        <div style="padding: 0 20px;">
            <div class="tab-bar">
                <div class="tab-item" :class="{active: currentTab === 'pending'}" @click="switchTab('pending')">
                    еҫ…е®Ўж ё/жңӘйҖҡиҝҮ <span v-if="pendingCount > 0" style="background:#ff9800;color:#fff;padding:2px 6px;border-radius:10px;font-size:12px;">{{pendingCount}}</span>
                </div>
                <div class="tab-item" :class="{active: currentTab === 'confirmed'}" @click="switchTab('confirmed')">е·ІзЎ®и®Ө</div>
                <div class="tab-item" :class="{active: currentTab === 'rejected'}" @click="switchTab('rejected')">е·ІжӢ’з»қ</div>
            </div>

            <div id="appointmentList">
                <div v-for="(item, index) in appointmentList" :key="index" class="appointment-card">
                    <div class="appointment-header">
                        <div class="appointment-title">йў„зәҰз»ғиҪҰ</div>
                        <span :class="getStatusClass(item.status)" class="status-tag">{{item.status}}</span>
                    </div>
                    <div class="info-row">
                        <div class="info-label">з»ғиҪҰж—¶й—ҙ</div>
                        <div class="info-value">{{item.liancheshijian}}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">еӯҰе‘ҳиҙҰеҸ·</div>
                        <div class="info-value">{{item.zhanghao}}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">еӯҰе‘ҳе§“еҗҚ</div>
                        <div class="info-value">{{item.xingming}}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">йў„зәҰиҜҙжҳҺ</div>
                        <div class="info-value">{{item.yuyueshuoming || 'ж— '}}</div>
                    </div>
                    <div v-if="item.shhf" class="info-row">
                        <div class="info-label">е®Ўж ёеӣһеӨҚ</div>
                        <div class="info-value">{{item.shhf}}</div>
                    </div>

                    <div v-if="currentTab === 'pending'" class="action-bar">
                        <button class="layui-btn layui-btn-sm" @click="showReplyDialog(item, 'жҳҜ')">йҖҡиҝҮ</button>
                        <button class="layui-btn layui-btn-sm layui-btn-danger" @click="showReplyDialog(item, 'еҗҰ')">жӢ’з»қ</button>
                    </div>
                </div>
                <div v-if="appointmentList.length === 0" style="text-align: center;padding: 50px;color: #999;">
                    жҡӮж— йў„зәҰи®°еҪ•
                </div>
            </div>
        </div>
    </div>

    <script src="../../layui/layui.js"></script>
    <script src="../../js/vue.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../modules/config.js"></script>
    <script src="../../js/utils.js"></script>

    <script>
        var vue = new Vue({
            el: '#app',
            data: {
                appointmentList: [],
                currentTab: 'pending',
                pendingCount: 0,
                baseurl: ''
            },
            mounted() {
                this.baseurl = layui.http.baseurl;
                // ж №жҚ®URLеҸӮж•°йў„йҖүtab
                var viewParam = this.getUrlParam('view');
                if (viewParam === 'yiqueren') {
                    this.currentTab = 'confirmed';
                } else if (viewParam === 'daishenhe') {
                    this.currentTab = 'pending';
                }
                this.getPendingCount();
                this.getAppointmentList();
            },
            methods: {
                getUrlParam: function(name) {
                    var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
                    var r = window.location.search.substr(1).match(reg);
                    if (r != null) return decodeURI(r[2]);
                    return null;
                },
                getPendingCount: function() {
                    var that = this;
                    layui.http.request('yuyuelianche/getPendingCount', 'get', {}, function(res) {
                        if(res.code == 0) {
                            that.pendingCount = res.count || 0;
                        }
                    });
                },
                getAppointmentList: function() {
                    var that = this;
                    var api = '';
                    if(that.currentTab === 'pending') {
                        api = 'yuyuelianche/getUnconfirmed';
                    } else if(that.currentTab === 'confirmed') {
                        api = 'yuyuelianche/getConfirmed';
                    } else if(that.currentTab === 'rejected') {
                        api = 'yuyuelianche/getRejected';
                    }

                    var params = {
                        page: 1,
                        limit: 100
                    };

                    layui.http.request(api, 'get', params, function(res) {
                        if(res.code == 0) {
                            that.appointmentList = res.data ? res.data.list : [];
                        }
                    });
                },
                switchTab: function(tab) {
                    this.currentTab = tab;
                    this.getAppointmentList();
                },
                getStatusClass: function(status) {
                    if(status === 'е·ІзЎ®и®Ө') return 'status-confirmed';
                    if(status === 'е·ІжӢ’з»қ') return 'status-rejected';
                    return 'status-pending';
                },
                showReplyDialog: function(item, sfsh) {
                    var that = this;
                    layui.layer.prompt({
                        formType: 2,
                        title: sfsh === 'жҳҜ' ? 'йҖҡиҝҮйў„зәҰ' : 'жӢ’з»қйў„зәҰ',
                        placeholder: 'иҜ·иҫ“е…Ҙе®Ўж ёеӣһеӨҚ'
                    }, function(value, index) {
                        that.approveAppointment(item, sfsh, value);
                        layui.layer.close(index);
                    });
                },
                approveAppointment: function(item, sfsh, reply) {
                    var that = this;
                    var data = {
                        id: item.id,
                        sfsh: sfsh,
                        shhf: reply
                    };
                    layui.http.request('yuyuelianche/sh', 'post', data, function(res) {
                        if(res.code == 0) {
                            layui.layer.msg('е®Ўж ёжҲҗеҠҹ', {icon: 6});
                            that.getPendingCount();
                            that.getAppointmentList();
                        } else {
                            layui.layer.msg(res.msg, {icon: 5});
                        }
                    });
                }
            }
        });

        layui.use(['layer', 'element', 'carousel', 'http', 'jquery', 'form'], function() {
            var layer = layui.layer;
            var element = layui.element;
            var carousel = layui.carousel;
            var http = layui.http;
            var jquery = layui.jquery;
            var form = layui.form;

            vue.baseurl = http.baseurl;
        });
    </script>
</body>
</html>
